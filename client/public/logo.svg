<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="40%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <linearGradient id="fillGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#6366f1" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a855f7" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect x="16" y="16" width="480" height="480" rx="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bgRadial)"/>

  <!-- Clipped content -->
  <g clip-path="url(#roundClip)">

    <!-- Orbiting rings -->
    <ellipse cx="256" cy="240" rx="220" ry="60" fill="none" stroke="url(#ringGrad)" stroke-width="0.8" opacity="0.15" transform="rotate(-15, 256, 240)"/>
    <ellipse cx="256" cy="240" rx="180" ry="50" fill="none" stroke="url(#ringGrad)" stroke-width="0.6" opacity="0.1" transform="rotate(20, 256, 240)"/>

    <!-- Particle dots -->
    <circle cx="90" cy="130" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="420" cy="100" r="1.5" fill="#d946ef" opacity="0.4"/>
    <circle cx="440" cy="280" r="2.5" fill="#6366f1" opacity="0.3"/>
    <circle cx="70" cy="350" r="1.5" fill="#a855f7" opacity="0.4"/>
    <circle cx="350" cy="420" r="2" fill="#06b6d4" opacity="0.3"/>
    <circle cx="150" cy="110" r="1" fill="#818cf8" opacity="0.6"/>
    <circle cx="380" cy="380" r="1.5" fill="#c084fc" opacity="0.35"/>

    <!-- Grid (subtle hex-style) -->
    <g opacity="0.05" stroke="#818cf8" stroke-width="0.7">
      <line x1="56" y1="140" x2="456" y2="140"/>
      <line x1="56" y1="210" x2="456" y2="210"/>
      <line x1="56" y1="280" x2="456" y2="280"/>
      <line x1="56" y1="350" x2="456" y2="350"/>
      <line x1="120" y1="80" x2="120" y2="420"/>
      <line x1="200" y1="80" x2="200" y2="420"/>
      <line x1="280" y1="80" x2="280" y2="420"/>
      <line x1="360" y1="80" x2="360" y2="420"/>
    </g>

    <!-- Chart area fill -->
    <path d="M80 330 C110 318, 130 295, 160 280 C190 265, 210 290, 240 295 C270 300, 295 230, 320 200 C345 170, 370 148, 400 130 L430 115 L430 395 L80 395 Z" fill="url(#fillGlow)"/>

    <!-- Main chart line (smooth curve) -->
    <path d="M80 330 C110 318, 130 295, 160 280 C190 265, 210 290, 240 295 C270 300, 295 230, 320 200 C345 170, 370 148, 400 130 L430 115"
          stroke="url(#neon)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neonGlow)"/>

    <!-- Secondary faint chart line -->
    <path d="M80 350 C120 345, 150 330, 190 325 C230 320, 260 340, 300 310 C340 280, 380 260, 430 240"
          stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6 4" fill="none" opacity="0.25"/>

    <!-- Data points with halos -->
    <circle cx="160" cy="280" r="14" fill="#6366f1" opacity="0.12"/>
    <circle cx="160" cy="280" r="5" fill="#0f0f1a" stroke="#6366f1" stroke-width="2.5"/>

    <circle cx="240" cy="295" r="14" fill="#818cf8" opacity="0.12"/>
    <circle cx="240" cy="295" r="5" fill="#0f0f1a" stroke="#818cf8" stroke-width="2.5"/>

    <circle cx="320" cy="200" r="16" fill="#a855f7" opacity="0.12"/>
    <circle cx="320" cy="200" r="6" fill="#0f0f1a" stroke="#a855f7" stroke-width="2.5"/>

    <circle cx="400" cy="130" r="16" fill="#d946ef" opacity="0.15"/>
    <circle cx="400" cy="130" r="6" fill="#0f0f1a" stroke="#d946ef" stroke-width="2.5"/>

    <!-- Tip glow point -->
    <circle cx="430" cy="115" r="20" fill="#d946ef" opacity="0.1"/>
    <circle cx="430" cy="115" r="10" fill="#d946ef" opacity="0.2"/>
    <circle cx="430" cy="115" r="5" fill="#d946ef" filter="url(#bigGlow)"/>

    <!-- Vertical scanner line -->
    <line x1="320" y1="100" x2="320" y2="395" stroke="#a855f7" stroke-width="1" opacity="0.12"/>
    <line x1="320" y1="195" x2="320" y2="205" stroke="#a855f7" stroke-width="2" opacity="0.5"/>

    <!-- AI neural nodes (top-left cluster) -->
    <g opacity="0.6">
      <circle cx="105" cy="155" r="4" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
      <circle cx="135" cy="135" r="3" fill="none" stroke="#6366f1" stroke-width="1.5"/>
      <circle cx="120" cy="175" r="3.5" fill="none" stroke="#818cf8" stroke-width="1.5"/>
      <circle cx="155" cy="160" r="3" fill="none" stroke="#a855f7" stroke-width="1.5"/>
      <line x1="105" y1="155" x2="135" y2="135" stroke="#6366f1" stroke-width="0.8" opacity="0.5"/>
      <line x1="105" y1="155" x2="120" y2="175" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
      <line x1="135" y1="135" x2="155" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
      <line x1="120" y1="175" x2="155" y2="160" stroke="#a855f7" stroke-width="0.8" opacity="0.4"/>
      <!-- inner dots -->
      <circle cx="105" cy="155" r="1.5" fill="#06b6d4"/>
      <circle cx="135" cy="135" r="1.5" fill="#6366f1"/>
      <circle cx="120" cy="175" r="1.5" fill="#818cf8"/>
      <circle cx="155" cy="160" r="1.5" fill="#a855f7"/>
    </g>

    <!-- Mini bar chart (bottom) -->
    <g opacity="0.4">
      <rect x="90"  y="365" width="16" height="30" rx="3" fill="url(#barGrad)"/>
      <rect x="115" y="355" width="16" height="40" rx="3" fill="url(#barGrad)"/>
      <rect x="140" y="360" width="16" height="35" rx="3" fill="url(#barGrad)"/>
      <rect x="165" y="345" width="16" height="50" rx="3" fill="url(#barGrad)"/>
      <rect x="190" y="352" width="16" height="43" rx="3" fill="url(#barGrad)"/>
      <rect x="215" y="340" width="16" height="55" rx="3" fill="url(#barGrad)"/>
      <rect x="240" y="350" width="16" height="45" rx="3" fill="url(#barGrad)"/>
      <rect x="265" y="338" width="16" height="57" rx="3" fill="url(#barGrad)"/>
      <rect x="290" y="342" width="16" height="53" rx="3" fill="url(#barGrad)"/>
      <rect x="315" y="332" width="16" height="63" rx="3" fill="url(#barGrad)"/>
      <rect x="340" y="348" width="16" height="47" rx="3" fill="url(#barGrad)"/>
      <rect x="365" y="336" width="16" height="59" rx="3" fill="url(#barGrad)"/>
      <rect x="390" y="340" width="16" height="55" rx="3" fill="url(#barGrad)"/>
    </g>

  </g>

  <!-- Border glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="url(#ringGrad)" stroke-width="2" opacity="0.4"/>

  <!-- Text at bottom -->
  <text x="256" y="462" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="40" font-weight="900" letter-spacing="8" fill="white" filter="url(#textGlow)">
    BAGSINDEX
  </text>
  <text x="256" y="480" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="5" fill="#818cf8" opacity="0.7">
    AI-POWERED
  </text>

</svg>